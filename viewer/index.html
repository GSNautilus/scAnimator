<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>scAnimator — Dataset Selection</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000; color: #fff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; flex-direction: column; gap: 40px;
  }
  h1 { font-weight: 300; font-size: 28px; letter-spacing: 2px; opacity: 0.9; }
  .subtitle { font-size: 14px; opacity: 0.4; margin-top: 4px; }
  .grid {
    display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
    max-width: 900px; padding: 0 24px;
  }
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 32px 36px;
    min-width: 220px;
    text-decoration: none; color: #fff;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .card:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.25);
    transform: translateY(-2px);
  }
  .card-title { font-size: 18px; font-weight: 400; margin-bottom: 8px; }
  .card-detail { font-size: 13px; opacity: 0.5; line-height: 1.5; }
  .loading { font-size: 13px; opacity: 0.3; }
  .load-section {
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
    padding: 0 24px;
  }
  .load-btn {
    background: rgba(255,255,255,0.04);
    border: 1px dashed rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 18px 28px;
    color: #fff; font-size: 14px;
    cursor: pointer; transition: background 0.2s, border-color 0.2s;
    font-family: inherit; display: flex; align-items: center; gap: 10px;
  }
  .load-btn:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.35);
  }
  .load-btn .icon { font-size: 20px; opacity: 0.5; }
  .load-btn .label { opacity: 0.7; }
  .load-btn .sublabel { font-size: 11px; opacity: 0.35; margin-top: 2px; }
  .load-status {
    font-size: 13px; opacity: 0.5; text-align: center;
    min-height: 20px; padding: 0 24px;
  }
</style>
</head>
<body>
<div style="text-align:center">
  <h1>scAnimator</h1>
  <div class="subtitle">scRNAseq — 3D UMAP Warp Visualization</div>
</div>
<div class="grid" id="grid">
  <div class="loading">Loading datasets...</div>
</div>
<div class="load-section">
  <button class="load-btn" id="btn-folder" title="Load a pre-built dataset folder (must contain metadata.json, frames.bin, etc.)">
    <div>
      <div class="label">Load Folder</div>
      <div class="sublabel">Pre-built dataset directory</div>
    </div>
  </button>
  <input type="file" id="folder-input" webkitdirectory directory multiple style="display:none">
</div>
<div class="load-status" id="load-status"></div>
<script>
const grid = document.getElementById('grid');
const status = document.getElementById('load-status');

async function loadDatasets() {
  // Discover datasets from datasets/index.json (auto-generated by build scripts)
  let datasetIds = [];
  try {
    const resp = await fetch('datasets/index.json');
    if (resp.ok) datasetIds = await resp.json();
  } catch(e) {}

  const cards = [];
  for (const id of datasetIds) {
    if (id.startsWith('_')) continue; // skip _local
    try {
      const resp = await fetch(`datasets/${id}/metadata.json`);
      if (!resp.ok) continue;
      const meta = await resp.json();
      const name = meta.name || id;
      const nCells = meta.n_cells?.toLocaleString() || '?';
      const nFrames = meta.n_frames || '?';
      const nGenes = meta.gene_names?.length?.toLocaleString() || '?';
      cards.push(`<a class="card" href="viewer.html?dataset=${id}">
        <div class="card-title">${name}</div>
        <div class="card-detail">
          ${nCells} cells &middot; ${nGenes} genes<br>
          ${nFrames} frames
        </div>
      </a>`);
    } catch(e) { /* dataset not available yet */ }
  }
  grid.innerHTML = cards.length
    ? cards.join('')
    : '<div class="loading">No datasets found. Run a build script to generate datasets/index.json.</div>';
}

// ── IndexedDB helpers ──
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('scAnimator', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('files');
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function storeFile(db, name, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('files', 'readwrite');
    tx.objectStore('files').put(data, name);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// ── Load Folder ──
const folderInput = document.getElementById('folder-input');
document.getElementById('btn-folder').addEventListener('click', () => folderInput.click());

folderInput.addEventListener('change', async () => {
  const files = folderInput.files;
  if (!files.length) return;

  const required = ['metadata.json', 'frames.bin', 'colors.bin', 'gene_index.json', 'expression.bin'];
  const optional = ['gene_ranks.json'];
  const wanted = new Set([...required, ...optional]);

  // Build a map of filename -> File from the selected directory
  const fileMap = {};
  for (const f of files) {
    const name = f.name;
    if (wanted.has(name)) fileMap[name] = f;
  }

  // Check required files
  for (const fname of required) {
    if (!fileMap[fname]) {
      status.textContent = `Missing required file: ${fname}`;
      return;
    }
  }

  status.textContent = 'Reading files from folder...';

  try {
    const db = await openDB();
    const clearTx = db.transaction('files', 'readwrite');
    clearTx.objectStore('files').clear();
    await new Promise(r => { clearTx.oncomplete = r; });

    for (const [fname, file] of Object.entries(fileMap)) {
      const isJson = fname.endsWith('.json');
      const data = isJson ? await file.text() : await file.arrayBuffer();
      await storeFile(db, fname, data);
      status.textContent = `Loaded ${fname}...`;
    }

    status.textContent = 'Launching viewer...';
    window.location.href = 'viewer.html?dataset=_local';
  } catch(e) {
    status.textContent = 'Error: ' + e.message;
  }
});

loadDatasets();
</script>
</body>
</html>
