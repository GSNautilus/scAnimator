<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>scAnimator — Dataset Selection</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000; color: #fff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; flex-direction: column; gap: 40px;
  }
  h1 { font-weight: 300; font-size: 28px; letter-spacing: 2px; opacity: 0.9; }
  .subtitle { font-size: 14px; opacity: 0.4; margin-top: 4px; }
  .grid {
    display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
    max-width: 900px; padding: 0 24px;
  }
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 32px 36px;
    min-width: 220px;
    text-decoration: none; color: #fff;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .card:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.25);
    transform: translateY(-2px);
  }
  .card-title { font-size: 18px; font-weight: 400; margin-bottom: 8px; }
  .card-detail { font-size: 13px; opacity: 0.5; line-height: 1.5; }
  .loading { font-size: 13px; opacity: 0.3; }
</style>
</head>
<body>
<div style="text-align:center">
  <h1>scAnimator</h1>
  <div class="subtitle">Neural scRNAseq — 3D UMAP Warp Visualization</div>
</div>
<div class="grid" id="grid">
  <div class="loading">Loading datasets...</div>
</div>
<script>
const datasets = [
  { id: 'allcombined', fallbackName: 'All Combined' },
  { id: 'dorsal',      fallbackName: 'Dorsal' },
  { id: 'ventral',     fallbackName: 'Ventral' },
];

const grid = document.getElementById('grid');

async function loadDatasets() {
  const cards = [];
  for (const ds of datasets) {
    try {
      const resp = await fetch(`datasets/${ds.id}/metadata.json`);
      if (!resp.ok) continue;
      const meta = await resp.json();
      const name = meta.name || ds.fallbackName;
      const nCells = meta.n_cells?.toLocaleString() || '?';
      const nFrames = meta.n_frames || '?';
      const nGenes = meta.gene_names?.length?.toLocaleString() || '?';
      cards.push(`<a class="card" href="datasets/${ds.id}/index.html">
        <div class="card-title">${name}</div>
        <div class="card-detail">
          ${nCells} cells &middot; ${nGenes} genes<br>
          ${nFrames} frames
        </div>
      </a>`);
    } catch(e) { /* dataset not available yet */ }
  }
  grid.innerHTML = cards.length
    ? cards.join('')
    : '<div class="loading">No datasets found. Run build_viewer.py to generate data.</div>';
}

loadDatasets();
</script>
</body>
</html>
