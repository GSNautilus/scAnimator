<!DOCTYPE html>
<!--
  Neural scRNAseq Viewer — Three.js WebGL UMAP Warp Visualization
  ================================================================

  PURPOSE
    Interactive 3D viewer for ~45K-cell neural scRNAseq data. Points are rendered
    as additive-blended glowing light sources on black. The UMAP embedding
    continuously warps by interpolating between Procrustes-aligned keyframes
    computed at different n_neighbors values (5..150).

  DATA FILES (loaded via fetch, served by local HTTP server)
    metadata.json    - n_cells, n_frames, nn_labels[], cell_types[], unique_types[],
                       palette{}, gene_names[], metadata_cols{} with per-column:
                       {label, values[], unique[]} for cell_type, seurat_clusters,
                       orig.ident, region, subgroup
    frames.bin       - Float32: nFrames * nCells * 3 (all ping-pong animation frames)
    colors.bin       - Float32: nCells * 3 RGB (original cell_type palette)
    gene_index.json  - {gene: [byte_offset, byte_length]} into expression.bin
    gene_ranks.json  - {gene: rank} sorted by total expression (1=highest)
    expression.bin   - Uint8: 28134 genes * 45386 cells, fetched on demand via
                       HTTP Range requests

  ARCHITECTURE (JS module, ~1100 lines)
    Loading        - Sequential fetch with progress bar
    Scene          - THREE.Scene, PerspectiveCamera, WebGLRenderer (ACESFilmic)
    OrbitControls  - Rotation + zoom only (enablePan=false, target at origin)
    Bloom          - UnrealBloomPass (strength 1.5, radius 0.4, threshold 0.2)
    Trail system   - Render target ping-pong: fade old + composite new via max()
    Point cloud    - BufferGeometry with custom ShaderMaterial:
                     Attributes: position(3), aColor(3), aSize(1)
                     Uniforms: uSize, uBrightness
                     Blending: Additive, transparent, no depth write
                     Fragment: radial falloff with pow(1-d*d, 1.5)
    Color system   - activeColors[] computed from activeColorCol + palette
                     Overridden by gene expression colormap/brightness mode
                     Legend toggles hide categories (size=0)
                     Filter checkboxes hide cells per any metadata column
    Gene overlay   - On-demand Range fetch, cached. Three modes:
                     colormap (viridis/magma/plasma/inferno LUT),
                     brightness (dim base colors), size (scale points)
                     Colorbar shown in bottom-right for colormap mode
    Autocomplete   - Matches sorted by expression rank from gene_ranks.json
                     Shows rank annotation like "#42/28134"
    Animation      - requestAnimationFrame loop with debt-accumulator FPS limiter (bypass during rec)
                     Accumulator-based frame stepping with configurable speed
    360 rotation   - Rodrigues rotation around camera's current up vector
    Recording      - captureStream(0) + MediaRecorder. Stream/track stored once at
                     start, requestFrame() called each render. Resolution override
                     with CSS size preservation. Auto-stops after one full loop.

  UI LAYOUT
    Top center     - n_neighbors label
    Left panel     - "scAnimator / v1.0.3" header, then:
                     Color By dropdown, Filter section (column selector + checkboxes),
                     Gene Expression (autocomplete + mapping + colormap selectors),
                     Sliders: brightness, bloom, point size, trail length
    Right          - Legend (click to toggle categories)
    Bottom center  - Play/Pause, frame slider, speed, 360 toggle, FPS limit,
                     resolution, format, record button
    Bottom right   - FPS counter (tiny monospace)

  KNOWN QUIRKS
    - build_viewer.py has an EMBEDDED copy of this HTML that may be stale.
      This file (viewer/index.html) is the canonical live version.
    - gene_ranks.json is generated by a separate one-off script, not build_viewer.py
-->

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ── Colormaps (256-step LUTs) ──
function buildLUT(stops) {
  // stops: array of [position, [r,g,b]] with position 0..1
  const lut = new Float32Array(256 * 3);
  for (let i = 0; i < 256; i++) {
    const t = i / 255;
    let s0 = stops[0], s1 = stops[stops.length - 1];
    for (let j = 0; j < stops.length - 1; j++) {
      if (t >= stops[j][0] && t <= stops[j + 1][0]) { s0 = stops[j]; s1 = stops[j + 1]; break; }
    }
    const f = s0[0] === s1[0] ? 0 : (t - s0[0]) / (s1[0] - s0[0]);
    lut[i * 3]     = s0[1][0] + (s1[1][0] - s0[1][0]) * f;
    lut[i * 3 + 1] = s0[1][1] + (s1[1][1] - s0[1][1]) * f;
    lut[i * 3 + 2] = s0[1][2] + (s1[1][2] - s0[1][2]) * f;
  }
  return lut;
}

const COLORMAPS = {
  viridis: buildLUT([
    [0, [0.267, 0.004, 0.329]], [0.13, [0.283, 0.141, 0.458]], [0.25, [0.254, 0.265, 0.530]],
    [0.38, [0.207, 0.372, 0.553]], [0.5, [0.164, 0.471, 0.558]], [0.63, [0.128, 0.567, 0.551]],
    [0.75, [0.135, 0.659, 0.518]], [0.88, [0.327, 0.774, 0.407]], [1, [0.993, 0.906, 0.144]],
  ]),
  magma: buildLUT([
    [0, [0.001, 0.0, 0.014]], [0.13, [0.099, 0.045, 0.264]], [0.25, [0.270, 0.060, 0.480]],
    [0.38, [0.449, 0.078, 0.510]], [0.5, [0.630, 0.130, 0.450]], [0.63, [0.810, 0.230, 0.330]],
    [0.75, [0.930, 0.380, 0.270]], [0.88, [0.982, 0.594, 0.401]], [1, [0.987, 0.991, 0.749]],
  ]),
  plasma: buildLUT([
    [0, [0.050, 0.030, 0.528]], [0.13, [0.246, 0.014, 0.636]], [0.25, [0.418, 0.001, 0.658]],
    [0.38, [0.576, 0.037, 0.595]], [0.5, [0.718, 0.120, 0.478]], [0.63, [0.835, 0.223, 0.340]],
    [0.75, [0.925, 0.362, 0.200]], [0.88, [0.976, 0.549, 0.040]], [1, [0.940, 0.975, 0.131]],
  ]),
  inferno: buildLUT([
    [0, [0.001, 0.0, 0.014]], [0.13, [0.088, 0.044, 0.290]], [0.25, [0.258, 0.039, 0.406]],
    [0.38, [0.416, 0.056, 0.364]], [0.5, [0.578, 0.148, 0.276]], [0.63, [0.735, 0.267, 0.173]],
    [0.75, [0.865, 0.420, 0.065]], [0.88, [0.954, 0.620, 0.026]], [1, [0.988, 0.998, 0.645]],
  ]),
};

// ── Categorical palettes ──
// Large palette for up to 30+ categories: Tableau20 + extras
const CATEGORY_PALETTE = [
  [0.122,0.467,0.706],[1.0,0.498,0.055],[0.173,0.627,0.173],[0.839,0.153,0.157],
  [0.580,0.404,0.741],[0.549,0.337,0.294],[0.890,0.467,0.761],[0.498,0.498,0.498],
  [0.737,0.741,0.133],[0.090,0.745,0.812],[0.682,0.780,0.910],[1.0,0.733,0.471],
  [0.596,0.875,0.541],[1.0,0.596,0.588],[0.773,0.690,0.835],[0.769,0.612,0.580],
  [0.969,0.714,0.824],[0.780,0.780,0.780],[0.859,0.859,0.553],[0.620,0.855,0.898],
  [0.400,0.761,0.647],[0.988,0.553,0.384],[0.553,0.627,0.796],[0.906,0.541,0.765],
  [0.651,0.847,0.329],[1.0,0.851,0.184],[0.529,0.808,0.922],[0.953,0.400,0.400],
  [0.400,0.400,0.800],[0.800,0.600,0.200],
];

function generatePalette(uniqueVals) {
  const pal = {};
  for (let i = 0; i < uniqueVals.length; i++) {
    pal[uniqueVals[i]] = CATEGORY_PALETTE[i % CATEGORY_PALETTE.length];
  }
  return pal;
}

// ── Load external data ──
const loadFill = document.getElementById('load-fill');
const loadMsg = document.getElementById('load-msg');

function progress(pct, msg) {
  loadFill.style.width = pct + '%';
  loadMsg.textContent = msg;
}

progress(5, 'Loading metadata...');
const META = await (await fetch('metadata.json')).json();
const nCells = META.n_cells;
const nFrames = META.n_frames;

progress(15, 'Loading frames...');
const framesBuf = await (await fetch('frames.bin')).arrayBuffer();
const allFrames = new Float32Array(framesBuf);
const frameSize = nCells * 3;
const frames = [];
for (let i = 0; i < nFrames; i++) {
  frames.push(allFrames.subarray(i * frameSize, (i + 1) * frameSize));
}

progress(60, 'Loading colors...');
const colorsBuf = await (await fetch('colors.bin')).arrayBuffer();
const baseColorsOriginal = new Float32Array(colorsBuf);

progress(70, 'Loading gene index...');
const geneIndex = await (await fetch('gene_index.json')).json();

progress(75, 'Loading gene ranks...');
let geneRanks = {};
try { geneRanks = await (await fetch('gene_ranks.json')).json(); } catch(e) {}
const totalGenes = Object.keys(geneRanks).length || 1;

progress(80, 'Initializing viewer...');

// ── Color-by state ──
const metaCols = META.metadata_cols;
const colKeys = Object.keys(metaCols);
let activeColorCol = 'cell_type';

// Precompute palettes for each metadata column
const colPalettes = {};
colPalettes['cell_type'] = META.palette; // use original palette
for (const key of colKeys) {
  if (key === 'cell_type') continue;
  colPalettes[key] = generatePalette(metaCols[key].unique);
}

// Current working colors (modified by color-by, gene, filter)
const activeColors = new Float32Array(nCells * 3);

function computeBaseColors() {
  const col = metaCols[activeColorCol];
  const pal = colPalettes[activeColorCol];
  for (let i = 0; i < nCells; i++) {
    const cat = col.values[i];
    const rgb = pal[cat] || [0.5, 0.5, 0.5];
    activeColors[i * 3]     = rgb[0];
    activeColors[i * 3 + 1] = rgb[1];
    activeColors[i * 3 + 2] = rgb[2];
  }
}

computeBaseColors();

// ── Filter state ──
let filterCol = colKeys[0];
const filterVisible = {};
for (const key of colKeys) {
  filterVisible[key] = {};
  for (const v of metaCols[key].unique) filterVisible[key][v] = true;
}

function isCellFiltered(i) {
  // Check all filter columns
  for (const key of colKeys) {
    const val = metaCols[key].values[i];
    if (!filterVisible[key][val]) return true;
  }
  return false;
}

// ── Scene ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 0, 14);

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });

// ── Trail accumulation ──
const rtParams = {
  minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter,
  format: THREE.RGBAFormat, type: THREE.HalfFloatType,
};
const pr = Math.min(devicePixelRatio, 2);
let trailA = new THREE.WebGLRenderTarget(innerWidth * pr, innerHeight * pr, rtParams);
let trailB = new THREE.WebGLRenderTarget(innerWidth * pr, innerHeight * pr, rtParams);

const fsQuadGeo = new THREE.PlaneGeometry(2, 2);
const fadeMaterial = new THREE.ShaderMaterial({
  uniforms: { tOld: { value: null }, tNew: { value: null }, uFade: { value: 0.0 } },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }`,
  fragmentShader: `
    uniform sampler2D tOld; uniform sampler2D tNew; uniform float uFade;
    varying vec2 vUv;
    void main() {
      vec4 old = texture2D(tOld, vUv) * uFade;
      vec4 nw = texture2D(tNew, vUv);
      gl_FragColor = max(old, nw);
    }
  `,
});
const fsQuad = new THREE.Mesh(fsQuadGeo, fadeMaterial);
const fsScene = new THREE.Scene(); fsScene.add(fsQuad);
const fsCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

const outputMaterial = new THREE.ShaderMaterial({
  uniforms: { tDiffuse: { value: null }, uExposure: { value: 1.2 } },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse; uniform float uExposure;
    varying vec2 vUv;
    // ACES filmic tone mapping (same curve as THREE.ACESFilmicToneMapping)
    vec3 ACESFilmic(vec3 x) {
      float a = 2.51, b = 0.03, c = 2.43, d = 0.59, e = 0.14;
      return clamp((x * (a * x + b)) / (x * (c * x + d) + e), 0.0, 1.0);
    }
    void main() {
      vec3 c = texture2D(tDiffuse, vUv).rgb * uExposure;
      gl_FragColor = vec4(ACESFilmic(c), 1.0);
    }
  `,
});
const outputQuad = new THREE.Mesh(fsQuadGeo.clone(), outputMaterial);
const outputScene = new THREE.Scene(); outputScene.add(outputQuad);

const sizesArr = new Float32Array(nCells);

geometry.setAttribute('aColor', new THREE.BufferAttribute(colorsArr, 3));
geometry.setAttribute('aSize', new THREE.BufferAttribute(sizesArr, 1));

let basePtSize = 8.0;

const material = new THREE.ShaderMaterial({
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
  uniforms: {
    uSize: { value: basePtSize * pr },
    uBrightness: { value: 1.8 },
  },
  vertexShader: `
    attribute vec3 aColor;
    attribute float aSize;
    varying vec3 vColor;
    varying float vAlpha;
    uniform float uSize;
    void main() {
      vColor = aColor;
      vAlpha = aSize;
      vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = uSize * aSize / -mvPos.z;
      gl_Position = projectionMatrix * mvPos;
    }
  `,
  fragmentShader: `
    varying vec3 vColor;
    varying float vAlpha;
    uniform float uBrightness;
    void main() {
      float d = length(gl_PointCoord - 0.5) * 2.0;
      if (d > 1.0) discard;
      float intensity = 1.0 - d * d;
      intensity = pow(intensity, 1.5);
      gl_FragColor = vec4(vColor * intensity * uBrightness, intensity * 0.85 * vAlpha);
    }
  `,
});

const pointsMesh = new THREE.Points(geometry, material);

let activeGene = null;

let geneColormapName = 'viridis';
const geneCache = {};

async function fetchGeneExpression(gene) {
  if (geneCache[gene]) return geneCache[gene];
  const info = geneIndex[gene];
  if (!info) return null;
  const [offset, length] = info;
  const resp = await fetch('expression.bin', {
    headers: { Range: `bytes=${offset}-${offset + length - 1}` }
  });
  const buf = await resp.arrayBuffer();
  const arr = new Uint8Array(buf);
  geneCache[gene] = arr;
  return arr;
}

function buildLegend() {
  legendEl.innerHTML = '';
  legendVisible = {};
  const col = metaCols[activeColorCol];
  const pal = colPalettes[activeColorCol];

  // Count cells per category
  const counts = {};
  for (const v of col.unique) counts[v] = 0;
  for (let i = 0; i < nCells; i++) counts[col.values[i]]++;

  for (const cat of col.unique) {
    legendVisible[cat] = true;
    const rgb = pal[cat] || [0.5, 0.5, 0.5];
    const hex = '#' + rgb.map(v => Math.round(v * 255).toString(16).padStart(2, '0')).join('');
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.innerHTML = `<span class="legend-dot" style="background:${hex};color:${hex}"></span>${cat} (${counts[cat]})`;
    div.addEventListener('click', () => {
      legendVisible[cat] = !legendVisible[cat];
      div.classList.toggle('disabled', !legendVisible[cat]);
      applyOverlay();
    });
    legendEl.appendChild(div);
  }
}

function drawColorbar() {
  if (!activeGene || geneMapping !== 'colormap') {
    colorbarEl.style.display = 'none';
    return;
  }
  colorbarEl.style.display = '';
  cbTitle.textContent = activeGene;
  const ctx = cbCanvas.getContext('2d');
  const lut = COLORMAPS[geneColormapName];
  const w = cbCanvas.width, h = cbCanvas.height;
  for (let x = 0; x < w; x++) {
    const i = Math.round((x / (w - 1)) * 255);
    ctx.fillStyle = `rgb(${Math.round(lut[i*3]*255)},${Math.round(lut[i*3+1]*255)},${Math.round(lut[i*3+2]*255)})`;
    ctx.fillRect(x, 0, 1, h);
  }
}

// ── Apply colors, gene overlay, legend toggle, filter ──
function applyOverlay() {
  const colors = geometry.attributes.aColor.array;
  const sizes = geometry.attributes.aSize.array;
  const col = metaCols[activeColorCol];

  // Start from base categorical colors
  for (let i = 0; i < nCells * 3; i++) colors[i] = activeColors[i];
  for (let i = 0; i < nCells; i++) sizes[i] = 1.0;

  // Gene expression overlay
  if (activeGene && activeGeneExpr) {
    if (geneMapping === 'colormap') {
      const lut = COLORMAPS[geneColormapName];
      for (let i = 0; i < nCells; i++) {
        const v = activeGeneExpr[i]; // 0-255
        colors[i * 3]     = lut[v * 3];
        colors[i * 3 + 1] = lut[v * 3 + 1];
        colors[i * 3 + 2] = lut[v * 3 + 2];
      }
    } else if (geneMapping === 'brightness') {
      for (let i = 0; i < nCells; i++) {
        const e = 0.08 + (activeGeneExpr[i] / 255) * 0.92;
        colors[i * 3]     = activeColors[i * 3] * e;
        colors[i * 3 + 1] = activeColors[i * 3 + 1] * e;
        colors[i * 3 + 2] = activeColors[i * 3 + 2] * e;
      }
    } else { // size
      for (let i = 0; i < nCells; i++) {
        sizes[i] = 0.15 + (activeGeneExpr[i] / 255) * 1.85;
      }
    }
  }

  // Legend toggle (hide categories in the color-by column)
  for (const cat of metaCols[activeColorCol].unique) {
    if (legendVisible[cat] === false) {
      for (let i = 0; i < nCells; i++) {
        if (col.values[i] === cat) {
          sizes[i] = 0;
          colors[i * 3] = 0; colors[i * 3 + 1] = 0; colors[i * 3 + 2] = 0;
        }
      }
    }
  }

  // Filter (hide cells that don't pass ANY filter column)
  for (let i = 0; i < nCells; i++) {
    if (isCellFiltered(i)) {
      sizes[i] = 0;
      colors[i * 3] = 0; colors[i * 3 + 1] = 0; colors[i * 3 + 2] = 0;
    }
  }

  geometry.attributes.aColor.needsUpdate = true;
  geometry.attributes.aSize.needsUpdate = true;
  drawColorbar();
}

  status.textContent = `${gene}: ${nonzero}/${nCells} cells expressing`;

const geneInput = document.getElementById('gene-input');

geneInput.addEventListener('input', () => {
  const q = geneInput.value.trim().toUpperCase();
  geneDropdown.innerHTML = '';
  highlightIdx = -1;
  if (q.length < 1) { geneDropdown.style.display = 'none'; return; }

  const candidates = [];
  for (const g of allGeneNames) {
    const u = g.toUpperCase();
    if (u.startsWith(q) || u.includes(q)) candidates.push(g);
    if (candidates.length >= 100) break;
  }
  // Sort by expression rank (lowest rank = highest expression)
  candidates.sort((a, b) => (geneRanks[a] || 99999) - (geneRanks[b] || 99999));
  const matches = candidates.slice(0, 25);
  if (matches.length === 0) { geneDropdown.style.display = 'none'; return; }

  for (const g of matches) {
    const rank = geneRanks[g];
    const opt = document.createElement('div');
    opt.className = 'gene-option';
    opt.innerHTML = rank
      ? `${g} <span style="opacity:0.35;font-size:10px">#${rank}/${totalGenes}</span>`
      : g;
    opt.addEventListener('mousedown', (e) => {
      e.preventDefault();
      geneInput.value = g;
      geneDropdown.style.display = 'none';
      selectGene(g);
    });
    geneDropdown.appendChild(opt);
  }
  geneDropdown.style.display = 'block';
});

geneInput.addEventListener('keydown', (e) => {
  const items = geneDropdown.querySelectorAll('.gene-option');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    highlightIdx = Math.min(highlightIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('highlighted', i === highlightIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    highlightIdx = Math.max(highlightIdx - 1, 0);
    items.forEach((el, i) => el.classList.toggle('highlighted', i === highlightIdx));
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (highlightIdx >= 0 && items[highlightIdx]) items[highlightIdx].dispatchEvent(new MouseEvent('mousedown'));
    else if (items.length > 0) items[0].dispatchEvent(new MouseEvent('mousedown'));
  }
});

// ── Recording ──
let isRecording = false;
let mediaRecorder = null;
let recordedChunks = [];
let recStream = null;
let recSquareCanvas = null;
let recSquareCtx = null;
let recSquareInterval = null;
// 360 sync during recording: total angle to rotate = 2π, spread over nFrames
let recRotationStart = null;  // camera offset vector at rec start
let recFrameCount = 0;        // frames rendered since rec started

const btnRecord = document.getElementById('btn-record');
const recIndicator = document.getElementById('rec-indicator');

function startRecording() {
  const fmt = 'webm';
  const wantSquare = document.getElementById('rec-square').checked;
  const recFps = fpsLimit > 0 ? fpsLimit : 60;

  // Always capture through a 2D canvas intermediary so drawImage applies
  // proper sRGB color space conversion (captureStream on WebGL skips this)
  const srcW = renderer.domElement.width;
  const srcH = renderer.domElement.height;
  let capW, capH, sx, sy;
  if (wantSquare) {
    const side = Math.min(srcW, srcH);
    capW = side; capH = side;
    sx = Math.floor((srcW - side) / 2);
    sy = Math.floor((srcH - side) / 2);
  } else {
    capW = srcW; capH = srcH;
    sx = 0; sy = 0;
  }
  recSquareCanvas = document.createElement('canvas');
  recSquareCanvas.width = capW;
  recSquareCanvas.height = capH;
  recSquareCtx = recSquareCanvas.getContext('2d');
  recSquareInterval = setInterval(() => {
    recSquareCtx.drawImage(renderer.domElement, sx, sy, capW, capH, 0, 0, capW, capH);
  }, 1000 / recFps);
  let sourceStream = recSquareCanvas.captureStream(recFps);
  recStream = sourceStream;

  const mimeType = 'video/webm;codecs=vp8';

  recordedChunks = [];
  mediaRecorder = new MediaRecorder(recStream, { mimeType, videoBitsPerSecond: 20000000 });
  mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    const blob = new Blob(recordedChunks, { type: mimeType });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `umap_warp.${fmt}`;
    a.click();
  };

  // Reset animation to frame 0
  currentFrame = 0;
  accumulator = 0;
  setFrame(0);
  slider.value = 0;

  // Save camera offset for synced 360 rotation
  recRotationStart = camera.position.clone().sub(orbitControls.target);
  recFrameCount = 0;

  isRecording = true;
  playing = true;
  btnPlay.textContent = 'Pause';
  mediaRecorder.start();
  btnRecord.textContent = 'Stop Rec';
  btnRecord.classList.add('recording');
  recIndicator.style.display = 'block';
}

function stopRecording() {
  if (!isRecording) return;
  isRecording = false;
  mediaRecorder.stop();
  recStream = null;
  if (recSquareInterval) { clearInterval(recSquareInterval); recSquareInterval = null; }
  recSquareCanvas = null;
  recSquareCtx = null;
  recRotationStart = null;
  btnRecord.textContent = 'Record Loop';
  btnRecord.classList.remove('recording');
  recIndicator.style.display = 'none';
}

btnRecord.addEventListener('click', () => {
  if (isRecording) stopRecording();
  else startRecording();
});

// ── Render loop ──
let lastTickTime = performance.now();
let lastRenderTime = performance.now();

function animate(now) {
  requestAnimationFrame(animate);

  // FPS limiting (bypass during recording)
  const tickDelta = now - lastTickTime;
  lastTickTime = now;
  if (!isRecording && fpsInterval > 0) {
    fpsDebt += tickDelta;
    if (fpsDebt < fpsInterval) return;
    fpsDebt -= fpsInterval;
    // Clamp to prevent catch-up spiral after tab-away
    if (fpsDebt > fpsInterval) fpsDebt = 0;
  }
  const dt = (now - lastRenderTime) / 1000;
  lastRenderTime = now;

  // FPS counter (counts rendered frames)
  renderFrames++;
  if (now - renderLastSample >= 500) {
    const fps = renderFrames / ((now - renderLastSample) / 1000);
    if (fpsLimit > 0) {
      fpsCounterEl.textContent = Math.round(fps) + ' (' + fpsLimit + ') fps';
    } else {
      fpsCounterEl.textContent = Math.round(fps) + ' fps';
    }
    renderFrames = 0;
    renderLastSample = now;
  }

  if (playing) {
    accumulator += dt * speed * 30;
    while (accumulator >= 1) {
      accumulator -= 1;
      const prevFrame = currentFrame;
      currentFrame = (currentFrame + 1) % nFrames;
      setFrame(currentFrame);

      if (isRecording) {
        recFrameCount++;
        // Stop precisely when we've completed one full loop
        if (currentFrame === 0 && prevFrame === nFrames - 1) {
          stopRecording();
          break;
        }
      }
    }
  }

  // 360 auto-rotation around camera's current up axis
  if (isRecording && rotating360 && recRotationStart) {
    // Sync rotation to frame progress: one full 360 over nFrames
    const angle = (2 * Math.PI * currentFrame) / nFrames;
    const up = camera.up.clone().normalize();
    const offset = recRotationStart.clone();
    const cosA = Math.cos(angle), sinA = Math.sin(angle);
    const dot = offset.dot(up);
    const cross = new THREE.Vector3().crossVectors(up, offset);
    offset.multiplyScalar(cosA).add(cross.multiplyScalar(sinA)).add(up.multiplyScalar(dot * (1 - cosA)));
    camera.position.copy(orbitControls.target).add(offset);
  } else if (rotating360) {
    const angle = rotateSpeed360 * dt;
    const up = camera.up.clone().normalize();
    const offset = camera.position.clone().sub(orbitControls.target);
    const cosA = Math.cos(angle), sinA = Math.sin(angle);
    const dot = offset.dot(up);
    const cross = new THREE.Vector3().crossVectors(up, offset);
    offset.multiplyScalar(cosA).add(cross.multiplyScalar(sinA)).add(up.multiplyScalar(dot * (1 - cosA)));
    camera.position.copy(orbitControls.target).add(offset);
  }

  orbitControls.update();

  if (trailFade < 0.01) {
    composer.renderToScreen = true;
    composer.render();
  } else {
    composer.renderToScreen = false;
    composer.render();
    fadeMaterial.uniforms.tOld.value = trailA.texture;
    fadeMaterial.uniforms.tNew.value = composer.readBuffer.texture;
    renderer.setRenderTarget(trailB);
    renderer.render(fsScene, fsCamera);
    outputMaterial.uniforms.tDiffuse.value = trailB.texture;
    renderer.setRenderTarget(null);
    renderer.render(outputScene, fsCamera);
    const tmp = trailA; trailA = trailB; trailB = tmp;
  }

  // captureStream with auto frame rate — no manual requestFrame needed
}

requestAnimationFrame(animate);

window.addEventListener('resize', () => {
  if (isRecording) return;
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  const pr = Math.min(devicePixelRatio, 2);
  trailA.setSize(innerWidth * pr, innerHeight * pr);
  trailB.setSize(innerWidth * pr, innerHeight * pr);
});
</script>
</body>
